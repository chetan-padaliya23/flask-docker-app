name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: chetan2308/flask-docker-app:latest

      

  terraform-deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
 
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        

      - name: Initialize Terraform
        run: terraform init
        working-directory: ./terraform

      - name: terraform plan
        run: terraform plan 
        working-directory: ./terraform
        env:
          TF_VAR_resource_group_name: ${{ secrets.TF_VAR_RESOURCE_GROUP_NAME }}
          TF_VAR_location: ${{ secrets.TF_VAR_LOCATION }}
          TF_VAR_vm_size: ${{ secrets.TF_VAR_VM_SIZE }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}

      - name: Apply Terraform configuration
        run: terraform apply -auto-approve 
        working-directory: ./terraform
        env:
          TF_VAR_resource_group_name: ${{ secrets.TF_VAR_RESOURCE_GROUP_NAME }}
          TF_VAR_location: ${{ secrets.TF_VAR_LOCATION }}
          TF_VAR_vm_size: ${{ secrets.TF_VAR_VM_SIZE }}
          TF_VAR_admin_username: ${{ secrets.TF_VAR_ADMIN_USERNAME }}
